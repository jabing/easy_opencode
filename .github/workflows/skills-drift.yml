name: skills-drift

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Regenerate skill registry
        run: node scripts/skill-registry.js --check --write skills/registry.json

      - name: Check registry drift
        run: git diff --exit-code -- skills/registry.json
